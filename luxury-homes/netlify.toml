[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[redirects]]
  from = "/"
  to = "/en"
  status = 302
  force = false
  conditions = {Language = ["en", "en-US", "en-GB"]}

[[redirects]]
  from = "/"
  to = "/ar"
  status = 302
  force = false
  conditions = {Language = ["ar"]}

[[redirects]]
  from = "/"
  to = "/ru"
  status = 302
  force = false
  conditions = {Language = ["ru"]}

[[redirects]]
  from = "/"
  to = "/zh"
  status = 302
  force = false
  conditions = {Language = ["zh"]}

[[redirects]]
  from = "/"
  to = "/en"
  status = 302
